<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PolicyPulse SZSE Widget</title>
  <style>
    :root {
      --bg: #0f172a;
      --card-bg: #1e293b;
      --green: #10b981;
      --red: #ef4444;
      --yellow: #f59e0b;
      --text: #e2e8f0;
      --text-light: #94a3b8;
      --border: #334155;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      padding: 16px;
      min-height: 100vh;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
    }
    header {
      text-align: center;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 4px;
      color: #fff;
    }
    .subtitle {
      font-size: 0.9rem;
      color: var(--text-light);
      font-weight: 400;
    }
    .status-card {
      background: var(--card-bg);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
      border-left: 4px solid var(--green);
      transition: all 0.3s ease;
    }
    .status-red { border-left-color: var(--red); }
    .status-yellow { border-left-color: var(--yellow); }
    .status-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }
    .status-icon {
      font-size: 1.4rem;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .icon-green { background: rgba(16, 185, 129, 0.15); color: var(--green); }
    .icon-red { background: rgba(239, 68, 68, 0.15); color: var(--red); }
    .icon-yellow { background: rgba(245, 158, 11, 0.15); color: var(--yellow); }
    .status-title {
      font-weight: 700;
      font-size: 1.1rem;
    }
    .status-desc {
      color: var(--text-light);
      font-size: 0.95rem;
      margin-top: 4px;
    }
    .source {
      font-size: 0.8rem;
      color: var(--text-light);
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid rgba(255,255,255,0.05);
    }
    .last-updated {
      font-size: 0.8rem;
      color: var(--text-light);
      text-align: right;
      margin-top: 16px;
    }
    .loader {
      text-align: center;
      padding: 24px;
      color: var(--text-light);
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f1f5f9;
        --card-bg: #ffffff;
        --text: #1e293b;
        --text-light: #64748b;
        --border: #cbd5e1;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>PolicyPulse · 深圳证券交易所</h1>
      <p class="subtitle">实时政策信号 · 基于您的A股决策框架</p>
    </header>

    <div id="rrr-status" class="status-card">
      <div class="status-header">
        <div class="status-icon icon-yellow">
          ⚠️
        </div>
        <div>
          <div class="status-title">RRR 政策待确认</div>
          <div class="status-desc">尚未检测到最近的存款准备金率调整公告</div>
        </div>
      </div>
      <div class="source">数据源：中国人民银行官网 RSS（http://www.pbc.gov.cn/rss/10693.xml）</div>
    </div>

    <div id="usdcny-status" class="status-card">
      <div class="status-header">
        <div class="status-icon icon-green">
          ✅
        </div>
        <div>
          <div class="status-title">人民币汇率稳定</div>
          <div class="status-desc">USD/CNY = 7.22（近7日均值），低于7.35阈值</div>
        </div>
      </div>
      <div class="source">数据源：Investing.com USD/CNY 1个月历史CSV（公开）</div>
    </div>

    <div class="last-updated">最后更新：<span id="last-update">—</span></div>
  </div>

  <script>
    // --- CONFIG ---
    const GREEN_THRESHOLD_USDCNY = 7.35;
    const RRR_KEYWORDS = ['reserve requirement ratio', 'rrr', '存款准备金率', '下调', 'cut', 'lower'];

    // --- DOM ELEMENTS ---
    const rrrEl = document.getElementById('rrr-status');
    const usdcnyEl = document.getElementById('usdcny-status');
    const lastUpdateEl = document.getElementById('last-update');

    // --- MOCK DATA (for demo / fallback) ---
    const mockPBOCItems = [
      {
        title: '中国人民银行决定下调金融机构存款准备金率0.5个百分点',
        pubDate: '2026-03-20T09:15:00+08:00',
        link: 'http://www.pbc.gov.cn/xxx'
      },
      {
        title: '关于加强宏观审慎管理的通知',
        pubDate: '2026-03-15T14:30:00+08:00',
        link: 'http://www.pbc.gov.cn/yyy'
      }
    ];

    const mockUSDCNY = 7.22;

    // --- UTILS ---
    function formatDate(dateStr) {
      const d = new Date(dateStr);
      return d.toLocaleString('zh-CN', { 
        year: 'numeric', 
        month: '2-digit', 
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit' 
      });
    }

    function updateLastUpdated() {
      lastUpdateEl.textContent = formatDate(new Date().toISOString());
    }

    // --- RRR STATUS ---
    function renderRRRStatus() {
      const latest = mockPBOCItems[0];
      const titleLower = latest.title.toLowerCase();
      const hasRRRKeyword = RRR_KEYWORDS.some(k => titleLower.includes(k));

      if (hasRRRKeyword && titleLower.includes('cut') || titleLower.includes('下调')) {
        rrrEl.className = 'status-card status-green';
        rrrEl.innerHTML = `
          <div class="status-header">
            <div class="status-icon icon-green">✅</div>
            <div>
              <div class="status-title">✅ 绿灯触发：RRR下调</div>
              <div class="status-desc">${latest.title}</div>
            </div>
          </div>
          <div class="source">发布于：${formatDate(latest.pubDate)}｜<a href="${latest.link}" target="_blank" style="color:#3b82f6;text-decoration:underline;">原文链接</a></div>
        `;
      } else {
        rrrEl.className = 'status-card status-yellow';
        rrrEl.innerHTML = `
          <div class="status-header">
            <div class="status-icon icon-yellow">⚠️</div>
            <div>
              <div class="status-title">RRR 政策待确认</div>
              <div class="status-desc">尚未检测到最近的存款准备金率调整公告</div>
            </div>
          </div>
          <div class="source">数据源：中国人民银行官网 RSS（http://www.pbc.gov.cn/rss/10693.xml）</div>
        `;
      }
    }

    // --- USD/CNY STATUS ---
    function renderUSDCNYStatus() {
      const isRed = mockUSDCNY > GREEN_THRESHOLD_USDCNY;
      
      if (isRed) {
        usdcnyEl.className = 'status-card status-red';
        usdcnyEl.innerHTML = `
          <div class="status-header">
            <div class="status-icon icon-red">❌</div>
            <div>
              <div class="status-title">❌ 红灯触发：汇率超阈值</div>
              <div class="status-desc">USD/CNY = ${mockUSDCNY.toFixed(2)} — 已突破7.35红线（持续3日）</div>
            </div>
          </div>
          <div class="source">数据源：Investing.com USD/CNY 1个月历史CSV（公开）</div>
        `;
      } else {
        usdcnyEl.className = 'status-card status-green';
        usdcnyEl.innerHTML = `
          <div class="status-header">
            <div class="status-icon icon-green">✅</div>
            <div>
              <div class="status-title">✅ 人民币汇率稳定</div>
              <div class="status-desc">USD/CNY = ${mockUSDCNY.toFixed(2)}（近7日均值），低于7.35阈值</div>
            </div>
          </div>
          <div class="source">数据源：Investing.com USD/CNY 1个月历史CSV（公开）</div>
        `;
      }
    }

    // --- INIT ---
    function init() {
      renderRRRStatus();
      renderUSDCNYStatus();
      updateLastUpdated();
    }

    // --- LIVE UPDATE SIMULATION (for real use: replace with fetch + setInterval) ---
    window.addEventListener('DOMContentLoaded', init);
    // In production: setInterval(() => { fetchAndRender(); }, 5 * 60 * 1000); // every 5 mins
  </script>
</body>
</html>
