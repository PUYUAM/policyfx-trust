# .github/workflows/ci-cd.yml — CI/CD for Policy+FX Trust Layer

name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: read
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Compile Python files
        run: |
          find . -name "*.py" -exec python3 -m py_compile {} \;
      
      - name: Validate JSON files
        run: |
          find data/ -name "*.json" -exec python3 -m json.tool {} \; > /dev/null
      
      - name: Check dashboard HTML
        run: |
          if ! grep -q "<title>Policy+FX Trust Dashboard</title>" ui/index.html; then
            echo "❌ ui/index.html missing expected title" >&2
            exit 1
          fi

  deploy-pages:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./ui
          publish_branch: gh-pages
          cname: policyfx.puyuam.dev  # optional — remove if not using custom domain

  alert-on-failure:
    if: always() && (needs.test.result == 'failure' || needs.deploy-pages.result == 'failure')
    needs: [test, deploy-pages]
    runs-on: ubuntu-latest
    steps:
      - name: Send Telegram Alert on Failure
        run: |
          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage \
            -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
            -d text="🚨 *CI/CD FAILURE*\n\n• Job: ${{ github.workflow }}\n• Run: ${{ github.run_id }}\n• Repo: ${{ github.repository }}\n• Trigger: ${{ github.event_name }}\n\nPowered by OpenClaw" \
            -d parse_mode=Markdown > /dev/null
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
